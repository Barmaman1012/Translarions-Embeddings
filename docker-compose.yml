version: "3.9"

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "echo 'Frontend container placeholder. Replace with Next.js dev command later.' && tail -f /dev/null"

  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: sh -c "echo 'Backend container placeholder. Replace with FastAPI dev command later.' && tail -f /dev/null"
